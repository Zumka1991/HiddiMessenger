services:
  server:
    build:
      context: ./server
    image: hiddi-server:local
    restart: unless-stopped
    environment:
      HIDDI_BOOTSTRAP_SECRET: ${HIDDI_BOOTSTRAP_SECRET:?set_in_dotenv}
      HIDDI_BIND_ADDR: 0.0.0.0:3000
      HIDDI_DATABASE_PATH: /var/lib/hiddi/hiddi.db
      RUST_LOG: hiddi_server=info,tower_http=info
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - hiddi_data:/var/lib/hiddi
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

volumes:
  hiddi_data:
